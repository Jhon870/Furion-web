<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RETROCRAFT // CINEMATIC_CORE</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');
        :root { --p: #00f2ff; --err: #ff3e3e; --ok: #4dff91; --bg: #050505; --mc: 'Minecraftia', sans-serif; }

        * { 
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><path d="M0 0v16l4-4 3 7 3-1-3-7h6z" fill="%2300f2ff" stroke="black" stroke-width="1.5"/></svg>'), auto;
            box-sizing: border-box; outline: none; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body, html { 
            background: var(--bg); color: var(--p); font-family: var(--mc);
            margin: 0; overflow: hidden; height: 100vh; width: 100vw;
            box-shadow: inset 0 0 150px #000;
        }

        /* --- CAPAS CINEMATOGRÁFICAS --- */
        .screen { 
            position: fixed; inset: 0; display: none; flex-direction: column; 
            justify-content: center; align-items: center; opacity: 0; 
            filter: blur(20px); transform: scale(1.1);
        }
        .screen.active { display: flex; opacity: 1; filter: blur(0px); transform: scale(1); z-index: 10; }

        /* --- PÁGINA DE INICIO (EDITABLE) --- */
        #landing { background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        .logo-anim { font-size: 55px; letter-spacing: 25px; text-shadow: 0 0 30px var(--p); animation: float 4s infinite ease-in-out; text-align: center; }
        @keyframes float { 0%, 100% { transform: translateY(0); opacity: 0.6; } 50% { transform: translateY(-10px); opacity: 1; } }

        /* --- BOTONES --- */
        .btn-cine {
            padding: 18px 45px; border: 1px solid rgba(0,242,255,0.2); background: transparent;
            color: var(--p); font-family: var(--mc); font-size: 9px; letter-spacing: 6px;
            cursor: pointer; position: relative; margin-top: 50px;
        }
        .btn-cine:hover { border-color: var(--p); background: rgba(0,242,255,0.05); box-shadow: 0 0 40px rgba(0,242,255,0.1); }

        /* --- DASHBOARD --- */
        #dash { padding: 60px; justify-content: flex-start; align-items: stretch; }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding-bottom: 30px; margin-bottom: 40px; }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .card { 
            border: 1px solid rgba(255,255,255,0.03); padding: 35px; background: rgba(255,255,255,0.01); 
            backdrop-filter: blur(10px);
        }
        .card:hover { border-color: var(--p); background: rgba(0,242,255,0.04); transform: translateY(-5px); }

        /* --- ADMIN PANEL (P) --- */
        #admin {
            position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 10000;
            display: none; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(25px);
            overflow-y: auto; padding: 40px 0;
        }
        .admin-box { width: 80%; max-width: 800px; padding: 40px; border: 1px solid #222; background: #000; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .field-group { margin-bottom: 15px; }
        label { font-size: 7px; color: #444; display: block; margin-bottom: 5px; letter-spacing: 2px; }
        input, textarea { background: #080808; border: 1px solid #1a1a1a; color: var(--p); padding: 12px; font-family: var(--mc); width: 100%; font-size: 10px; }
        
        /* --- CARGA Y ERROR --- */
        .load-fill { height: 100%; background: var(--p); width: 0%; box-shadow: 0 0 20px var(--p); }
        .crash-mode { animation: flash 0.05s infinite; }
        @keyframes flash { 0%, 100% { filter: brightness(1) invert(0); } 50% { filter: brightness(2) invert(1); } }
        .data-stream { position: fixed; inset: 0; z-index: 9998; pointer-events: none; display: none; font-size: 10px; color: #fff; opacity: 0.6; }
        .stream-line { position: absolute; white-space: nowrap; animation: move-up 0.6s linear infinite; }
        @keyframes move-up { from { transform: translateY(100vh); } to { transform: translateY(-100%); } }
    </style>
</head>
<body id="main-body">

    <div id="chaos-layer" class="data-stream"></div>

    <div id="landing" class="screen active">
        <div id="lan-title" class="logo-anim">RETROCRAFT</div>
        <div id="lan-sub" style="font-size: 7px; letter-spacing: 12px; opacity: 0.3;">SISTEMA DE CONTROL PRIVADO</div>
        <button id="lan-btn" class="btn-cine" onclick="switchScreen('register')">BOOT_SYSTEM</button>
    </div>

    <div id="register" class="screen">
        <div style="width: 320px;">
            <div style="font-size: 9px; letter-spacing: 5px; margin-bottom: 40px; text-align: center; opacity: 0.6;">ACCESO AL NODO</div>
            <input type="text" id="reg-user" placeholder="USER_ID">
            <input type="password" id="reg-pass" placeholder="PASSWORD">
            <button class="btn-cine" style="width: 100%;" onclick="finalizeAuth()">INICIAR SESIÓN</button>
        </div>
    </div>

    <div id="cine" class="screen">
        <div id="c-title" style="font-size: 15px; letter-spacing: 15px; opacity: 0.5;">CONECTANDO...</div>
        <div style="width: 350px; height: 1px; background: #111; margin-top: 40px;"><div class="load-fill" id="c-fill"></div></div>
    </div>

    <div id="dash" class="screen">
        <div class="header">
            <div><div id="d-name" style="font-size: 22px; letter-spacing: 5px;"></div><div style="font-size: 8px; color: #333; margin-top: 5px;">RETROCRAFT_OS // ONLINE</div></div>
            <div id="clock" style="font-size: 12px; opacity: 0.5;">00:00:00</div>
        </div>
        <div class="card-grid">
            <div class="card" onclick="runProc('NORMAL')"><h3 id="b1-title"></h3><p id="b1-desc" style="font-size: 8px; opacity: 0.4; line-height: 1.6;"></p></div>
            <div class="card" onclick="runProc('DÍA')" style="border-color: var(--ok);"><h3 id="b3-title"></h3><p id="b3-desc" style="font-size: 8px; opacity: 0.4;"></p></div>
            <div class="card" onclick="runProc('EVENTO')" style="border-color: var(--err);"><h3 id="b2-title"></h3><p id="b2-desc" style="font-size: 8px; opacity: 0.4;"></p></div>
        </div>
        <div id="log-console" style="margin-top: auto; height: 120px; font-size: 8px; color: #151515; display: flex; flex-direction: column-reverse; overflow: hidden;"></div>
    </div>

    <div id="status-screen" class="screen" style="background: #000;">
        <div id="status-msg" style="font-size: 40px; letter-spacing: 20px; font-weight: bold; color: var(--err);">NODO_COLAPSADO</div>
        <div id="status-sub" style="margin-top: 20px; font-size: 10px; opacity: 0.3;">ERROR_CODE: 0xRETROCRAFT_FAIL // PULSAR [ R ]</div>
    </div>

    <div id="admin">
        <div class="admin-box">
            <div style="margin-bottom: 30px; font-size: 10px; letter-spacing: 5px; border-bottom: 1px solid #222; padding-bottom: 10px;">CONFIGURACIÓN DEL NÚCLEO RETROCRAFT</div>
            
            <div class="admin-grid">
                <div>
                    <div class="field-group"><label>TÍTULO INICIO</label><input type="text" id="ed-lan-t"></div>
                    <div class="field-group"><label>SUBTÍTULO INICIO</label><input type="text" id="ed-lan-s"></div>
                    <div class="field-group"><label>TEXTO BOTÓN</label><input type="text" id="ed-lan-b"></div>
                    <div class="field-group"><label>NOMBRE OPERADOR</label><input type="text" id="ed-name"></div>
                </div>
                <div>
                    <div class="field-group"><label>COLOR PRIMARIO (HEX)</label><input type="text" id="ed-color"></div>
                    <div class="field-group"><label>CONTRASEÑA</label><input type="text" id="ed-pass"></div>
                    <div class="field-group"><label>TEXTO DE CARGA</label><input type="text" id="ed-cine"></div>
                </div>
            </div>

            <div style="border-top: 1px solid #111; margin-top: 20px; padding-top: 20px;">
                <div class="admin-grid">
                    <div class="field-group"><label>BOTÓN 1 TÍTULO</label><input type="text" id="ed-b1-t"></div>
                    <div class="field-group"><label>BOTÓN 1 DESC</label><textarea id="ed-b1-d"></textarea></div>
                    <div class="field-group"><label>BOTÓN 2 TÍTULO</label><input type="text" id="ed-b2-t"></div>
                    <div class="field-group"><label>BOTÓN 2 DESC</label><textarea id="ed-b2-d"></textarea></div>
                </div>
            </div>

            <button class="btn-cine" style="width: 100%; margin-top: 20px;" onclick="save()">APLICAR CAMBIOS</button>
            <div style="text-align: center; margin-top: 15px; font-size: 7px; opacity: 0.3;">PRESIONA [ P ] PARA CANCELAR</div>
        </div>
    </div>

    <script>
        let config = JSON.parse(localStorage.getItem('rc_cine_cfg')) || {
            lanT: "RETROCRAFT", lanS: "SISTEMA DE CONTROL PRIVADO", lanB: "BOOT_SYSTEM",
            name: "JHON HERNANDEZ", color: "#00f2ff", pass: "1234",
            b1T: "REPARAR_NODO", b1D: "Diagnóstico de seguridad rápido.",
            b2T: "PROTOCOLO_X", b2D: "⚠️ Inicia secuencia de colapso (8s).",
            b3T: "DÍA_ESTÁNDAR", b3D: "Entorno de trabajo normal.",
            cine: "INICIALIZANDO NÚCLEO..."
        };

        let isBusy = false;

        function apply() {
            document.documentElement.style.setProperty('--p', config.color);
            document.getElementById('lan-title').innerText = config.lanT;
            document.getElementById('lan-sub').innerText = config.lanS;
            document.getElementById('lan-btn').innerText = config.lanB;
            document.getElementById('d-name').innerText = config.name;
            document.getElementById('b1-title').innerText = config.b1T;
            document.getElementById('b1-desc').innerText = config.b1D;
            document.getElementById('b2-title').innerText = config.b2T;
            document.getElementById('b2-desc').innerText = config.b2D;
            document.getElementById('b3-title').innerText = config.b3T;
            document.getElementById('b3-desc').innerText = config.b3D;
            
            // Llenar inputs de la P
            document.getElementById('ed-lan-t').value = config.lanT;
            document.getElementById('ed-lan-s').value = config.lanS;
            document.getElementById('ed-lan-b').value = config.lanB;
            document.getElementById('ed-name').value = config.name;
            document.getElementById('ed-color').value = config.color;
            document.getElementById('ed-b1-t').value = config.b1T;
            document.getElementById('ed-b1-d').value = config.b1D;
            document.getElementById('ed-b2-t').value = config.b2T;
            document.getElementById('ed-b2-d').value = config.b2D;
            document.getElementById('ed-cine').value = config.cine;
            document.getElementById('ed-pass').value = config.pass;
        }

        function save() {
            config = {
                lanT: document.getElementById('ed-lan-t').value, lanS: document.getElementById('ed-lan-sub').value || config.lanS,
                lanB: document.getElementById('ed-lan-b').value, name: document.getElementById('ed-name').value,
                color: document.getElementById('ed-color').value, b1T: document.getElementById('ed-b1-t').value,
                b1D: document.getElementById('ed-b1-d').value, b2T: document.getElementById('ed-b2-t').value,
                b2D: document.getElementById('ed-b2-d').value, b3T: config.b3T, b3D: config.b3D,
                cine: document.getElementById('ed-cine').value, pass: document.getElementById('ed-pass').value,
                lanS: document.getElementById('ed-lan-s').value
            };
            localStorage.setItem('rc_cine_cfg', JSON.stringify(config));
            apply(); toggleAdmin();
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const t = document.getElementById(id); t.style.display = 'flex';
            setTimeout(() => t.classList.add('active'), 50);
        }

        function finalizeAuth() {
            const user = document.getElementById('reg-user').value;
            if(user) config.name = user.toUpperCase();
            runProc('INICIO');
        }

        window.onkeydown = (e) => {
            const k = e.key.toLowerCase();
            if (k === 'r' && e.target.tagName !== "INPUT" && e.target.tagName !== "TEXTAREA") location.reload();
            if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
            if (k === 'p' && !isBusy) toggleAdmin();
        };

        function toggleAdmin() { document.getElementById('admin').style.display = document.getElementById('admin').style.display === 'flex' ? 'none' : 'flex'; }

        async function runProc(type) {
            isBusy = true; switchScreen('cine');
            document.getElementById('c-title').innerText = config.cine.toUpperCase();
            let p = 0; const fill = document.getElementById('c-fill');
            while(p <= 100) {
                p++; fill.style.width = p + '%';
                if(p === 100) {
                    await new Promise(r => setTimeout(r, 600));
                    if(type === 'EVENTO') await start8sCrash();
                    else { isBusy = false; switchScreen('dash'); addLog("ESTADO: NODO ESTABLE."); }
                    return;
                }
                await new Promise(r => setTimeout(r, 25));
            }
        }

        async function start8sCrash() {
            const body = document.getElementById('main-body');
            const chaos = document.getElementById('chaos-layer');
            body.classList.add('crash-mode');
            chaos.style.display = 'block';
            switchScreen('status-screen');

            for(let i=0; i<100; i++) {
                const l = document.createElement('div');
                l.className = 'stream-line'; l.style.left = Math.random() * 100 + '%';
                l.style.animationDuration = (0.2 + Math.random() * 0.5) + 's';
                l.innerText = `RETROCRAFT_FATAL_0x${Math.random().toString(16).substr(2,6)}`;
                chaos.appendChild(l);
            }

            setTimeout(async () => {
                body.classList.remove('crash-mode');
                chaos.style.display = 'none';
                chaos.innerHTML = '';
                document.getElementById('status-msg').innerText = "RECUPERANDO...";
                document.getElementById('status-msg').style.color = "var(--ok)";
                await new Promise(r => setTimeout(r, 2000));
                isBusy = false; switchScreen('dash');
                addLog("AUTO_REBOOT: EXITOSO.");
            }, 8000);
        }

        function addLog(m) {
            const d = document.createElement('div');
            d.innerText = `> [${new Date().toLocaleTimeString()}] ${m}`;
            document.getElementById('log-console').prepend(d);
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        apply();
    </script>
</body>
</html>
